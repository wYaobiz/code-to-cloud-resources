# .github/workflows/deploy.yml
#
# Runs on every push to main: checks the code, runs the tests, and deploys
# only if everything passed. Each job runs on a fresh virtual machine
# provided by GitHub.

name: Test and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # A MySQL service container for the tests to run against
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check syntax
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

      - name: Run tests
        run: vendor/bin/phpunit

  deploy:
    # needs: test means this job waits for the tests and is skipped if they fail
    needs: test
    runs-on: ubuntu-latest
    # Only deploy from main, never from a pull request
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/myapp
            git pull origin main
            composer install --no-dev --optimize-autoloader
            sudo systemctl reload apache2
