<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>input type = file Example</title>
</head>
<body>
  <!-- Create a form that uploads a file -->
  <form method="POST" enctype="multipart/form-data">
    Click to upload a file : <input type="file" value="Select a file" />
  </form>
</body>
</html>
