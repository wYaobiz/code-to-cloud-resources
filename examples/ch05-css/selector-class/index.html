<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Class Selectors </title>

<style>

  #heading

    {

       color:blue;

       font-weight:bold;

       font-family:cursive;

      }

  .ireland

    {

       color:green;

     }

  .spain

    {

      color:goldenrod;

     }

  .italy

    {

       color:red;

     }

</style>

</head>

<body>

<!--Create a heading that is styled to be blue in color bold in face type and cursive -->

<h1 id = "heading">Countries To Visit</h1>

<!--Create an unordered list that will consist of three nested unordered lists and uses class selectors -->

<ul>

  <li class = "ireland">Ireland</li>

<ul>

    <li> Dublin</li>

    <li> Donegal</li>

     <li> Dingle</li>

</ul>

  <li class="spain">Spain</li>

<ul>

    <li> Valencia</li>

    <li> Madrid</li>

    <li> Barcelona</li>

</ul>

  <li class="italy">Italy</li>

<ul>

    <li> Rome</li>

    <li> Florence</li>

     <li> Venice</li>

</ul>

</ul>

</body>

</html>
